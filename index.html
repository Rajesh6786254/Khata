<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<title>Khata — your private ledger</title>
<meta name="theme-color" content="#16211c"/>
<meta name="description" content="A private expense and income tracker."/>

<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Khata"/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #16211c;
    --surface: #1e2b24;
    --surface-2: #24352c;
    --rule: #2f4a3a;
    --paper: #e8e6de;
    --paper-dim: #a9b3aa;
    --gold: #d4a94a;
    --rust: #c1553d;
    --sage: #5fa88f;
    --font-display: 'Spectral', Georgia, serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-body: 'Inter', -apple-system, sans-serif;
  }
  html, body { margin:0; padding:0; background: var(--ink); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    color: var(--paper);
    font-family: var(--font-body);
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  #app { position: relative; min-height: 100vh; min-height: 100dvh; }

  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 20px 110px; }

  /* header */
  .head { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 20px; }
  .brand { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: 0.5px; color: var(--paper); }
  .brand .dot { color: var(--gold); }
  .tagline { font-size: 11px; color: var(--paper-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  .month-nav { display:flex; align-items:center; gap: 10px; }
  .month-nav button { background: var(--surface-2); border: 1px solid var(--rule); color: var(--paper); width: 32px; height:32px; border-radius: 6px; cursor:pointer; font-size:16px; }
  .month-nav button:hover { border-color: var(--gold); color: var(--gold); }
  .month-label { font-family: var(--font-mono); font-size: 13px; min-width: 92px; text-align:center; color: var(--paper-dim); }

  /* stat stamps */
  .stats { display:grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 22px; }
  .stat { background: var(--surface); border: 1px solid var(--rule); border-radius: 10px; padding: 12px 10px; position: relative; }
  .stat::before { content:''; position:absolute; top:8px; right:8px; width:6px; height:6px; border-radius:50%; }
  .stat.income::before { background: var(--sage); }
  .stat.expense::before { background: var(--rust); }
  .stat.balance::before { background: var(--gold); }
  .stat.today::before { background: var(--paper-dim); }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--paper-dim); margin-bottom: 6px; }
  .stat-value { font-family: var(--font-mono); font-size: 15px; font-weight: 600; }
  .stat.expense .stat-value { color: var(--rust); }
  .stat.income .stat-value { color: var(--sage); }
  .stat.balance .stat-value { color: var(--gold); }

  /* charts row */
  .charts { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 22px; }
  .chart-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 12px; padding: 16px; }
  .chart-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--paper-dim); margin-bottom: 10px; }
  .chart-body { display:flex; align-items:center; justify-content:center; }
  .legend { margin-top: 10px; display:flex; flex-direction:column; gap: 5px; max-height: 110px; overflow-y:auto; }
  .legend-row { display:flex; align-items:center; gap:6px; font-size: 11.5px; }
  .legend-swatch { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .legend-name { flex:1; color: var(--paper); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .legend-pct { font-family: var(--font-mono); color: var(--paper-dim); }
  .empty-note { font-size: 12px; color: var(--paper-dim); text-align:center; padding: 20px 0; }

  /* budget bar */
  .budget-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 12px; padding: 14px 16px; margin-bottom: 22px; }
  .budget-top { display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px; font-size: 12px; }
  .budget-top .label { color: var(--paper-dim); text-transform:uppercase; letter-spacing:1px; font-size:10px; }
  .budget-edit { background:none; border:none; color: var(--gold); font-size: 11px; cursor:pointer; text-decoration: underline; }
  .budget-track { height: 8px; background: var(--rule); border-radius: 4px; overflow:hidden; }
  .budget-fill { height:100%; background: var(--sage); transition: width .4s ease; }
  .budget-fill.over { background: var(--rust); }
  .budget-nums { display:flex; justify-content:space-between; margin-top: 6px; font-family: var(--font-mono); font-size:11px; color: var(--paper-dim); }

  /* filters */
  .filters { display:flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filters select, .filters input {
    background: var(--surface); border: 1px solid var(--rule); color: var(--paper);
    border-radius: 7px; padding: 8px 10px; font-size: 13px; font-family: var(--font-body);
  }
  .filters input[type="text"] { flex:1; min-width: 100px; }

  /* ledger list */
  .ledger { border-top: 1px dashed var(--rule); }
  .date-group { margin-top: 16px; }
  .date-heading { font-family: var(--font-mono); font-size: 11px; color: var(--paper-dim); margin-bottom: 6px; letter-spacing: 0.5px; }
  .row { display:flex; align-items:center; padding: 10px 2px; border-bottom: 1px dotted var(--rule); gap: 8px; }
  .row-cat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .row-main { flex:1; min-width:0; }
  .row-note { font-size: 14px; color: var(--paper); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .row-cat { font-size: 10.5px; color: var(--paper-dim); }
  .row-amt { font-family: var(--font-mono); font-size: 14px; font-weight:600; white-space:nowrap; }
  .row-amt.income { color: var(--sage); }
  .row-amt.expense { color: var(--rust); }
  .row-del { background:none; border:none; color: var(--paper-dim); cursor:pointer; font-size: 15px; padding: 4px 6px; }
  .no-tx { text-align:center; padding: 40px 10px; color: var(--paper-dim); font-size: 13px; }

  /* FAB + form */
  .fab { position: fixed; bottom: calc(22px + env(safe-area-inset-bottom)); right: 22px; width: 56px; height: 56px; border-radius: 50%;
    background: var(--gold); color: var(--ink); border:none; font-size: 27px; cursor:pointer; box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    display:flex; align-items:center; justify-content:center; z-index: 20; }
  .fab:active { transform: scale(0.95); }
  .sheet-backdrop { position:fixed; inset:0; background: rgba(0,0,0,0.6); z-index: 30; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition: opacity .2s; }
  .sheet-backdrop.open { opacity:1; pointer-events:all; }
  .sheet { background: var(--surface); width:100%; border-radius: 18px 18px 0 0; padding: 22px 20px calc(26px + env(safe-area-inset-bottom)); border-top: 1px solid var(--rule);
    transform: translateY(100%); transition: transform .25s ease; max-height: 85%; overflow-y:auto; }
  .sheet-backdrop.open .sheet { transform: translateY(0); }
  .sheet-title { font-family: var(--font-display); font-size: 19px; margin-bottom: 16px; }
  .type-toggle { display:flex; gap:8px; margin-bottom: 14px; }
  .type-toggle button { flex:1; padding: 10px; border-radius: 8px; border: 1px solid var(--rule); background: var(--surface-2); color: var(--paper-dim); cursor:pointer; font-size: 13px; font-weight:600; }
  .type-toggle button.active.expense { background: rgba(193,85,61,0.18); border-color: var(--rust); color: var(--rust); }
  .type-toggle button.active.income { background: rgba(95,168,143,0.18); border-color: var(--sage); color: var(--sage); }
  .field { margin-bottom: 12px; }
  .field label { display:block; font-size: 10.5px; text-transform:uppercase; letter-spacing:1px; color: var(--paper-dim); margin-bottom: 5px; }
  .field input, .field select {
    width:100%; background: var(--surface-2); border: 1px solid var(--rule); color: var(--paper);
    border-radius: 8px; padding: 11px; font-size: 15px; font-family: var(--font-body);
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--gold); }
  .amt-input { font-family: var(--font-mono); font-size: 20px !important; }
  .sheet-actions { display:flex; gap:10px; margin-top: 18px; }
  .btn { flex:1; padding: 13px; border-radius: 9px; border:none; font-size: 14.5px; font-weight: 600; cursor:pointer; font-family: var(--font-body); }
  .btn-save { background: var(--gold); color: var(--ink); }
  .btn-cancel { background: transparent; border: 1px solid var(--rule); color: var(--paper-dim); }

  /* footer tools */
  .tools-row { display:flex; justify-content:center; gap: 18px; margin-top: 26px; flex-wrap: wrap; }
  .tool-link { font-size: 11px; color: var(--paper-dim); background:none; border:none; text-decoration: underline; cursor:pointer; }
  .tool-link:hover { color: var(--gold); }
  .privacy-note { text-align:center; font-size: 10.5px; color: var(--paper-dim); margin-top: 6px; opacity: 0.75; }
  .install-hint { background: var(--surface); border: 1px dashed var(--gold); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--paper-dim); margin-bottom: 18px; display:none; }
  .install-hint.show { display:block; }
  .install-hint b { color: var(--gold); }

  .loading { text-align:center; padding: 60px 0; color: var(--paper-dim); font-family: var(--font-mono); font-size: 13px; }

  @media (max-width: 420px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .charts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  const CATS = {
    income: ['Salary','Freelance','Business','Investment','Gift','Other Income'],
    expense: ['Food','Groceries','Transport','Rent','Bills & Utilities','Shopping','Health','Entertainment','Education','Other Expense']
  };
  const PALETTE = ['#d4a94a','#5fa88f','#c1553d','#7c96c9','#b07fc7','#c9995f','#6fb3b8','#9a9a5f','#c97fa0','#8fa85f'];
  const STORE_KEY_TX = 'khata:transactions';
  const STORE_KEY_BUDGET = 'khata:budget';

  const root = document.getElementById('app');
  const state = {
    tx: [],
    budget: 0,
    loaded: false,
    monthOffset: 0,
    filterType: 'all',
    filterCat: 'all',
    search: '',
    newType: 'expense'
  };

  function fmt(n){
    const v = Math.round(n*100)/100;
    return '₹' + v.toLocaleString('en-IN', {minimumFractionDigits: v % 1 !== 0 ? 2 : 0, maximumFractionDigits: 2});
  }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function uid(){ return 'tx_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

  function currentMonthDate(){
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() + state.monthOffset);
    return d;
  }
  function monthLabel(){
    return currentMonthDate().toLocaleDateString('en-IN', {month:'long', year:'numeric'});
  }
  function inSelectedMonth(dateStr){
    const d = new Date(dateStr + 'T00:00:00');
    const m = currentMonthDate();
    return d.getFullYear() === m.getFullYear() && d.getMonth() === m.getMonth();
  }

  // --- Storage: plain localStorage. This app runs standalone on your device,
  // so data lives only in this browser/app instance — never sent anywhere.
  function loadData(){
    try {
      const t = localStorage.getItem(STORE_KEY_TX);
      state.tx = t ? JSON.parse(t) : [];
    } catch(e) { state.tx = []; }
    try {
      const b = localStorage.getItem(STORE_KEY_BUDGET);
      state.budget = b ? JSON.parse(b) : 0;
    } catch(e) { state.budget = 0; }
    state.loaded = true;
    render();
  }
  function persistTx(){
    try { localStorage.setItem(STORE_KEY_TX, JSON.stringify(state.tx)); }
    catch(e){ console.error('save failed', e); }
  }
  function persistBudget(){
    try { localStorage.setItem(STORE_KEY_BUDGET, JSON.stringify(state.budget)); }
    catch(e){ console.error('save failed', e); }
  }

  function addTx(entry){
    state.tx.push(Object.assign({id: uid()}, entry));
    persistTx();
    render();
  }
  function deleteTx(id){
    state.tx = state.tx.filter(t => t.id !== id);
    persistTx();
    render();
  }

  function monthTx(){
    return state.tx.filter(t => inSelectedMonth(t.date));
  }
  function filteredTx(){
    return monthTx().filter(t => {
      if (state.filterType !== 'all' && t.type !== state.filterType) return false;
      if (state.filterCat !== 'all' && t.category !== state.filterCat) return false;
      if (state.search && !(t.note||'').toLowerCase().includes(state.search.toLowerCase()) && !t.category.toLowerCase().includes(state.search.toLowerCase())) return false;
      return true;
    }).sort((a,b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  }

  function pieSlicePath(cx, cy, r, startAngle, endAngle){
    const toXY = (ang) => [cx + r*Math.cos(ang), cy + r*Math.sin(ang)];
    const [x1,y1] = toXY(startAngle);
    const [x2,y2] = toXY(endAngle);
    const large = (endAngle - startAngle) > Math.PI ? 1 : 0;
    return `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
  }

  function renderDonutIncomeExpense(income, expense){
    const total = income + expense;
    if (total === 0) {
      return '<div class="empty-note">Add a transaction to see<br/>your income vs expense split</div>';
    }
    const cx=70, cy=70, r=58, rInner=34;
    let angle = -Math.PI/2;
    const segs = [];
    [['Income', income, PALETTE[1]], ['Expense', expense, PALETTE[2]]].forEach(([name,val,color]) => {
      if (val <= 0) return;
      const frac = val/total;
      const end = angle + frac*2*Math.PI;
      segs.push(`<path d="${pieSlicePath(cx,cy,r,angle,end)}" fill="${color}"></path>`);
      angle = end;
    });
    return `
      <svg width="140" height="140" viewBox="0 0 140 140">
        ${segs.join('')}
        <circle cx="${cx}" cy="${cy}" r="${rInner}" fill="var(--surface)"></circle>
        <text x="${cx}" y="${cy-3}" text-anchor="middle" font-family="var(--font-mono)" font-size="12" fill="var(--paper-dim)">Balance</text>
        <text x="${cx}" y="${cy+13}" text-anchor="middle" font-family="var(--font-mono)" font-size="13" font-weight="700" fill="${income-expense>=0?'var(--sage)':'var(--rust)'}">${fmt(income-expense)}</text>
      </svg>
      <div class="legend">
        <div class="legend-row"><span class="legend-swatch" style="background:${PALETTE[1]}"></span><span class="legend-name">Income</span><span class="legend-pct">${fmt(income)}</span></div>
        <div class="legend-row"><span class="legend-swatch" style="background:${PALETTE[2]}"></span><span class="legend-name">Expense</span><span class="legend-pct">${fmt(expense)}</span></div>
      </div>`;
  }

  function renderCategoryPie(items){
    if (!items.length) return '<div class="empty-note">No expenses yet<br/>this month</div>';
    const total = items.reduce((s,i)=>s+i.value,0);
    const cx=70, cy=70, r=58;
    let angle = -Math.PI/2;
    const segs = [], legend = [];
    items.forEach((item, idx) => {
      const frac = item.value/total;
      const end = angle + frac*2*Math.PI;
      const color = PALETTE[idx % PALETTE.length];
      segs.push(`<path d="${pieSlicePath(cx,cy,r,angle,end)}" fill="${color}" stroke="var(--surface)" stroke-width="1.5"></path>`);
      legend.push(`<div class="legend-row"><span class="legend-swatch" style="background:${color}"></span><span class="legend-name">${item.name}</span><span class="legend-pct">${Math.round(frac*100)}%</span></div>`);
      angle = end;
    });
    return `<svg width="140" height="140" viewBox="0 0 140 140">${segs.join('')}</svg>
      <div class="legend">${legend.join('')}</div>`;
  }

  function computeStats(){
    const mtx = monthTx();
    const income = mtx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const expense = mtx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const today = todayStr();
    const todaySpend = state.tx.filter(t=>t.type==='expense' && t.date===today).reduce((s,t)=>s+t.amount,0);
    const catMap = {};
    mtx.filter(t=>t.type==='expense').forEach(t=>{ catMap[t.category] = (catMap[t.category]||0) + t.amount; });
    const catItems = Object.entries(catMap).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
    return {income, expense, todaySpend, catItems, balance: income-expense};
  }

  function groupByDate(list){
    const groups = {};
    list.forEach(t => { (groups[t.date] = groups[t.date] || []).push(t); });
    return Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0]));
  }

  function dateHeading(dateStr){
    const d = new Date(dateStr+'T00:00:00');
    const today = todayStr();
    const yest = new Date(); yest.setDate(yest.getDate()-1);
    if (dateStr === today) return 'Today';
    if (dateStr === yest.toISOString().slice(0,10)) return 'Yesterday';
    return d.toLocaleDateString('en-IN', {weekday:'short', day:'numeric', month:'short'});
  }

  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  function render(){
    if (!state.loaded){
      root.innerHTML = '<div class="loading">opening the ledger…</div>';
      return;
    }
    const stats = computeStats();
    const budgetPct = state.budget > 0 ? Math.min(100, (stats.expense/state.budget)*100) : 0;
    const list = filteredTx();
    const grouped = groupByDate(list);

    const catOptions = (CATS[state.newType]||[]).map(c=>`<option value="${c}">${c}</option>`).join('');
    const allCatsForFilter = [...new Set(state.tx.map(t=>t.category))].sort();
    const showInstallHint = !isStandalone();

    root.innerHTML = `
      <div class="wrap">
        <div class="head">
          <div>
            <div class="brand">Khata<span class="dot">.</span></div>
            <div class="tagline">your private ledger</div>
          </div>
          <div class="month-nav">
            <button id="prevMonth">‹</button>
            <div class="month-label">${monthLabel()}</div>
            <button id="nextMonth" ${state.monthOffset>=0?'disabled style="opacity:.3;cursor:default"':''}>›</button>
          </div>
        </div>

        ${showInstallHint ? `<div class="install-hint show">📲 Tap your browser's <b>Share</b> / <b>⋮ menu</b> and choose <b>"Add to Home Screen"</b> to install Khata like an app.</div>` : ''}

        <div class="stats">
          <div class="stat income"><div class="stat-label">Income</div><div class="stat-value">${fmt(stats.income)}</div></div>
          <div class="stat expense"><div class="stat-label">Expense</div><div class="stat-value">${fmt(stats.expense)}</div></div>
          <div class="stat balance"><div class="stat-label">Balance</div><div class="stat-value">${fmt(stats.balance)}</div></div>
          <div class="stat today"><div class="stat-label">Spent today</div><div class="stat-value">${fmt(stats.todaySpend)}</div></div>
        </div>

        <div class="charts">
          <div class="chart-card">
            <div class="chart-title">Income vs Expense</div>
            <div class="chart-body" style="flex-direction:column">${renderDonutIncomeExpense(stats.income, stats.expense)}</div>
          </div>
          <div class="chart-card">
            <div class="chart-title">Where it went</div>
            <div class="chart-body" style="flex-direction:column">${renderCategoryPie(stats.catItems)}</div>
          </div>
        </div>

        <div class="budget-card">
          <div class="budget-top">
            <span class="label">Monthly budget</span>
            <button class="budget-edit" id="editBudget">${state.budget>0? 'edit' : 'set a budget'}</button>
          </div>
          ${state.budget>0 ? `
            <div class="budget-track"><div class="budget-fill ${stats.expense>state.budget?'over':''}" style="width:${budgetPct}%"></div></div>
            <div class="budget-nums"><span>${fmt(stats.expense)} spent</span><span>${fmt(state.budget)} limit</span></div>
          ` : `<div class="empty-note" style="padding:4px 0">Set a limit to track how you're pacing this month</div>`}
        </div>

        <div class="filters">
          <select id="filterType">
            <option value="all" ${state.filterType==='all'?'selected':''}>All</option>
            <option value="income" ${state.filterType==='income'?'selected':''}>Income</option>
            <option value="expense" ${state.filterType==='expense'?'selected':''}>Expense</option>
          </select>
          <select id="filterCat">
            <option value="all">All categories</option>
            ${allCatsForFilter.map(c=>`<option value="${c}" ${state.filterCat===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <input type="text" id="searchBox" placeholder="Search notes…" value="${state.search}"/>
        </div>

        <div class="ledger">
          ${grouped.length ? grouped.map(([date, items]) => `
            <div class="date-group">
              <div class="date-heading">${dateHeading(date)}</div>
              ${items.map(t => `
                <div class="row">
                  <span class="row-cat-dot" style="background:${t.type==='income'?'var(--sage)':'var(--rust)'}"></span>
                  <div class="row-main">
                    <div class="row-note">${t.note ? t.note : t.category}</div>
                    <div class="row-cat">${t.category}</div>
                  </div>
                  <div class="row-amt ${t.type}">${t.type==='income'?'+':'−'}${fmt(t.amount)}</div>
                  <button class="row-del" data-id="${t.id}" title="Delete">✕</button>
                </div>
              `).join('')}
            </div>
          `).join('') : '<div class="no-tx">No transactions here yet.<br/>Tap + to add your first one.</div>'}
        </div>

        <div class="tools-row">
          <button class="tool-link" id="exportBtn">Export backup (.json)</button>
          <button class="tool-link" id="resetBtn">Clear all data</button>
        </div>
        <div class="privacy-note">Stored only on this device — never sent anywhere.</div>
      </div>

      <button class="fab" id="openSheet">+</button>

      <div class="sheet-backdrop" id="sheetBackdrop">
        <div class="sheet">
          <div class="sheet-title">Add entry</div>
          <div class="type-toggle">
            <button type="button" class="expense ${state.newType==='expense'?'active':''}" data-type="expense">Expense</button>
            <button type="button" class="income ${state.newType==='income'?'active':''}" data-type="income">Income</button>
          </div>
          <div class="field">
            <label>Amount (₹)</label>
            <input type="number" id="fAmount" class="amt-input" placeholder="0" min="0" step="0.01" inputmode="decimal"/>
          </div>
          <div class="field">
            <label>Category</label>
            <select id="fCategory">${catOptions}</select>
          </div>
          <div class="field">
            <label>Note (optional)</label>
            <input type="text" id="fNote" placeholder="e.g. lunch with friends"/>
          </div>
          <div class="field">
            <label>Date</label>
            <input type="date" id="fDate" value="${todayStr()}"/>
          </div>
          <div class="sheet-actions">
            <button class="btn btn-cancel" id="cancelSheet">Cancel</button>
            <button class="btn btn-save" id="saveSheet">Save entry</button>
          </div>
        </div>
      </div>
    `;

    // wire events
    root.querySelector('#prevMonth').onclick = () => { state.monthOffset--; render(); };
    const nextBtn = root.querySelector('#nextMonth');
    if (!nextBtn.disabled) nextBtn.onclick = () => { state.monthOffset = Math.min(0, state.monthOffset+1); render(); };

    root.querySelector('#filterType').onchange = (e) => { state.filterType = e.target.value; render(); };
    root.querySelector('#filterCat').onchange = (e) => { state.filterCat = e.target.value; render(); };
    root.querySelector('#searchBox').oninput = (e) => { state.search = e.target.value; render(); };

    root.querySelectorAll('.row-del').forEach(btn => {
      btn.onclick = () => deleteTx(btn.dataset.id);
    });

    root.querySelector('#openSheet').onclick = () => {
      root.querySelector('#sheetBackdrop').classList.add('open');
    };
    root.querySelector('#cancelSheet').onclick = () => {
      root.querySelector('#sheetBackdrop').classList.remove('open');
    };
    root.querySelector('#sheetBackdrop').onclick = (e) => {
      if (e.target.id === 'sheetBackdrop') e.currentTarget.classList.remove('open');
    };
    root.querySelectorAll('.type-toggle button').forEach(btn => {
      btn.onclick = () => { state.newType = btn.dataset.type; render(); root.querySelector('#sheetBackdrop').classList.add('open'); root.querySelector('#fAmount').focus(); };
    });
    root.querySelector('#saveSheet').onclick = () => {
      const amount = parseFloat(root.querySelector('#fAmount').value);
      const category = root.querySelector('#fCategory').value;
      const note = root.querySelector('#fNote').value.trim();
      const date = root.querySelector('#fDate').value || todayStr();
      if (!amount || amount <= 0) { root.querySelector('#fAmount').style.borderColor = 'var(--rust)'; return; }
      addTx({type: state.newType, amount, category, note, date});
      root.querySelector('#sheetBackdrop').classList.remove('open');
    };

    root.querySelector('#editBudget').onclick = () => {
      const val = prompt('Set your monthly budget (₹):', state.budget || '');
      if (val !== null) {
        const num = parseFloat(val);
        state.budget = isNaN(num) ? 0 : num;
        persistBudget();
        render();
      }
    };

    root.querySelector('#exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify({transactions: state.tx, budget: state.budget}, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'khata-backup-' + todayStr() + '.json';
      a.click();
      URL.revokeObjectURL(url);
    };
    root.querySelector('#resetBtn').onclick = () => {
      if (confirm('This will permanently delete all your transactions and budget. Continue?')) {
        state.tx = [];
        state.budget = 0;
        persistTx();
        persistBudget();
        render();
      }
    };
  }

  loadData();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
